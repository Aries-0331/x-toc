<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X & Twitter Article TOC - Options</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div>
        <h1>Options</h1>
      </div>
    </header>

    <main class="options-layout">
      <section class="settings-section excerpt-section">
        <div class="section-header">
          <div class="section-title-block">
            <h2>Saved Excerpts</h2>
            <div class="compact-stats" aria-label="Saved excerpt stats">
              <span><strong id="articleCount">0</strong> articles</span>
              <span><strong id="excerptCount">0</strong> excerpts</span>
            </div>
          </div>
          <div class="excerpt-actions">
            <button class="selection-summary hidden" id="clearSelectionBtn" type="button" title="Clear selection">
              <span aria-hidden="true">×</span>
              <strong id="selectionSummary">0 selected</strong>
            </button>
            <div class="dropdown" id="exportDropdown">
              <button class="btn-compact" id="exportMenuBtn" type="button" aria-expanded="false" aria-haspopup="true">Export</button>
              <div class="dropdown-menu" id="exportMenu" role="menu">
                <button type="button" id="exportMarkdownMenuItem" data-action="export-markdown" role="menuitem">All excerpts as Markdown</button>
                <button type="button" id="exportJsonMenuItem" data-action="export-json" role="menuitem">All excerpts as JSON</button>
              </div>
            </div>
            <button class="btn-compact danger hidden" id="deleteSelectedBtn" type="button">Delete selected</button>
          </div>
        </div>
        <div class="excerpt-search-row">
          <label class="excerpt-search" for="excerptSearchInput">
            <span>Search excerpts</span>
            <input id="excerptSearchInput" type="search" autocomplete="off" placeholder="Search text, title, author, tags, or notes">
          </label>
        </div>

        <div id="excerptManager" class="excerpt-manager">
          <p class="empty-state">No saved excerpts yet.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="scripts.js"></script>
</body>
</html>
